<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>WGAN Streamlit Frontend</title>
    <style>
      body { font-family: Inter, Arial, sans-serif; background: #eef2ff; color: #111827; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
      .card { max-width: 760px; padding: 36px; border-radius: 24px; background: #ffffff; box-shadow: 0 30px 90px rgba(15, 23, 42, 0.12); text-align: center; }
      h1 { margin-bottom: 18px; font-size: 32px; color: #1f2937; }
      p { margin: 0; font-size: 17px; line-height: 1.75; color: #4b5563; }
      code { display: block; margin: 24px auto 0; padding: 18px 20px; border-radius: 16px; background: #eef2ff; color: #1e40af; font-size: 15px; text-align: left; max-width: 100%; overflow-x: auto; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>WGAN Streamlit Frontend</h1>
      <p>The HTML frontend has been replaced by a Streamlit app. Run the new interface with Streamlit to use the redesigned frontend.</p>
      <code>streamlit run wgan_frontend.py</code>
    </div>
  </body>
</html>
